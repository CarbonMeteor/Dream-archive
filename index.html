<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梦境志 · Dream Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #05060f;
    --bg2:       #0b0d1a;
    --bg3:       #111428;
    --border:    rgba(140,160,210,0.13);
    --text:      #ddd8cc;
    --text-dim:  #8a8880;
    --moon:      #b8c8e8;
    --gold:      #c9b68a;
    --red:       #c97a7a;
    --glow:      rgba(120,150,220,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── NOISE OVERLAY ─── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.5;
  }

  /* ─── NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem;
    height: 56px;
    background: rgba(5,6,15,0.88);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.35rem;
    font-style: italic;
    letter-spacing: .12em;
    color: var(--moon);
    cursor: pointer;
    user-select: none;
  }
  .nav-logo span { color: var(--gold); font-style: normal; }

  .nav-links { display: flex; gap: .2rem; align-items: center; }
  .nav-btn {
    background: none; border: none;
    color: var(--text-dim); font-family: 'Noto Serif SC', serif;
    font-size: .82rem; padding: .45rem .9rem;
    cursor: pointer; border-radius: 4px;
    transition: all .2s;
    letter-spacing: .04em;
  }
  .nav-btn:hover, .nav-btn.active { color: var(--moon); background: var(--glow); }
  .nav-sep { width: 1px; height: 18px; background: var(--border); margin: 0 .4rem; }

  /* ─── MAIN LAYOUT ─── */
  main {
    flex: 1;
    margin-top: 56px;
    padding: 2.5rem 2rem;
    max-width: 1100px;
    width: 100%;
    margin-left: auto;
    margin-right: auto;
    position: relative; z-index: 1;
  }

  /* ─── PAGE SECTIONS ─── */
  .page { display: none; }
  .page.active { display: block; }

  /* ─── LANDING ─── */
  #page-landing {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: calc(100vh - 120px);
    text-align: center; gap: 2rem;
  }
  #page-landing.active { display: flex; }

  .landing-moon {
    font-size: 4rem; line-height: 1;
    filter: drop-shadow(0 0 24px rgba(180,200,240,0.4));
  }

  .landing-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3.2rem; font-weight: 300;
    color: var(--moon);
    letter-spacing: .2em;
    line-height: 1.2;
  }
  .landing-title em { font-style: italic; color: var(--gold); }

  .landing-sub {
    font-size: .88rem; color: var(--text-dim);
    letter-spacing: .08em; line-height: 1.8;
  }

  .landing-actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }

  .btn-primary {
    padding: .7rem 1.8rem;
    background: linear-gradient(135deg, rgba(140,160,220,0.18), rgba(100,120,180,0.08));
    border: 1px solid rgba(140,160,220,0.35);
    color: var(--moon); border-radius: 6px;
    cursor: pointer; font-family: 'Noto Serif SC', serif;
    font-size: .88rem; letter-spacing: .06em;
    transition: all .25s;
  }
  .btn-primary:hover { background: rgba(140,160,220,0.28); border-color: var(--moon); }

  .btn-secondary {
    padding: .7rem 1.8rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim); border-radius: 6px;
    cursor: pointer; font-family: 'Noto Serif SC', serif;
    font-size: .88rem; letter-spacing: .06em;
    transition: all .25s;
  }
  .btn-secondary:hover { border-color: var(--text-dim); color: var(--text); }

  /* ─── PASTE MODAL ─── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(3,4,12,0.82); backdrop-filter: blur(6px);
    z-index: 200; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    width: min(680px, 94vw);
    max-height: 90vh;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 1.2rem;
  }
  .modal h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem; color: var(--moon);
    font-weight: 300; letter-spacing: .1em;
  }
  .modal-meta {
    font-size: .78rem; color: var(--text-dim); line-height: 1.7;
  }
  .modal textarea {
    width: 100%; height: 280px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px; padding: 1rem;
    color: var(--text); font-family: 'Noto Serif SC', serif;
    font-size: .82rem; line-height: 1.8; resize: vertical;
    outline: none;
    transition: border-color .2s;
  }
  .modal textarea:focus { border-color: rgba(140,160,220,0.45); }
  .modal-actions { display: flex; gap: .8rem; justify-content: flex-end; }

  /* ─── DASHBOARD ─── */
  .dash-header {
    margin-bottom: 2rem;
    display: flex; align-items: flex-end; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.2rem;
  }
  .dash-header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem; font-weight: 300;
    color: var(--moon); letter-spacing: .12em;
  }
  .dash-date { font-size: .8rem; color: var(--text-dim); letter-spacing: .08em; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem; margin-bottom: 2.5rem;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 1.2rem 1.4rem;
    transition: border-color .2s;
  }
  .stat-card:hover { border-color: rgba(140,160,220,0.3); }
  .stat-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.4rem; color: var(--moon);
    line-height: 1; margin-bottom: .4rem;
  }
  .stat-label { font-size: .75rem; color: var(--text-dim); letter-spacing: .08em; }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem; color: var(--gold);
    letter-spacing: .1em; font-weight: 300;
    margin-bottom: 1.2rem;
    display: flex; align-items: center; gap: .8rem;
  }
  .section-title::after {
    content: ''; flex: 1;
    height: 1px; background: var(--border);
  }

  /* ─── SYMBOL INDEX ─── */
  .filter-bar {
    display: flex; flex-wrap: wrap; gap: .6rem;
    margin-bottom: 1.5rem; align-items: center;
  }
  .filter-bar select, .filter-bar input {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text); border-radius: 5px;
    padding: .45rem .8rem;
    font-family: 'Noto Serif SC', serif;
    font-size: .82rem; outline: none;
    cursor: pointer;
    transition: border-color .2s;
  }
  .filter-bar select:focus, .filter-bar input:focus {
    border-color: rgba(140,160,220,0.45);
  }
  .filter-bar input { min-width: 160px; }
  .filter-bar label { font-size: .8rem; color: var(--text-dim); }

  .filter-chip {
    padding: .35rem .8rem;
    border: 1px solid var(--border);
    border-radius: 20px; background: transparent;
    color: var(--text-dim); font-size: .78rem;
    cursor: pointer; transition: all .2s;
    font-family: 'Noto Serif SC', serif;
    letter-spacing: .04em;
  }
  .filter-chip:hover, .filter-chip.active {
    border-color: rgba(140,160,220,0.5);
    background: var(--glow); color: var(--moon);
  }

  .symbols-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: .8rem;
  }
  .symbol-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 1rem 1.2rem;
    cursor: pointer; transition: all .22s;
    display: flex; align-items: center; justify-content: space-between;
  }
  .symbol-card:hover {
    border-color: rgba(140,160,220,0.4);
    background: var(--bg3);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(100,130,200,0.08);
  }
  .symbol-word { font-size: 1rem; letter-spacing: .04em; }
  .symbol-count {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem; color: var(--moon); opacity: .7;
  }

  /* ─── SYMBOL DETAIL ─── */
  .back-btn {
    display: inline-flex; align-items: center; gap: .5rem;
    background: none; border: none;
    color: var(--text-dim); cursor: pointer;
    font-family: 'Noto Serif SC', serif;
    font-size: .82rem; letter-spacing: .04em;
    margin-bottom: 1.5rem;
    transition: color .2s;
  }
  .back-btn:hover { color: var(--moon); }

  .detail-header {
    margin-bottom: 2rem;
    display: flex; align-items: baseline; gap: 1.5rem;
  }
  .detail-word {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.8rem; color: var(--moon);
    font-weight: 300; letter-spacing: .15em;
  }
  .detail-freq { font-size: .9rem; color: var(--text-dim); }

  .month-section { margin-bottom: 1.5rem; }
  .month-label {
    font-size: .78rem; color: var(--gold);
    letter-spacing: .12em; margin-bottom: .6rem;
    font-weight: 400;
  }
  .date-chips { display: flex; flex-wrap: wrap; gap: .5rem; }
  .date-chip {
    padding: .4rem .9rem;
    border: 1px solid var(--border);
    border-radius: 20px; background: var(--bg2);
    color: var(--text-dim); font-size: .8rem;
    cursor: pointer; transition: all .2s;
    letter-spacing: .04em;
  }
  .date-chip:hover {
    border-color: rgba(140,160,220,0.5);
    color: var(--moon); background: var(--glow);
  }

  .block-btn {
    color: var(--text-dim); font-size: .7rem;
    opacity: 0; transition: opacity .15s;
    padding: .2rem .3rem; border-radius: 3px;
    cursor: pointer;
  }
  .symbol-card:hover .block-btn { opacity: 1; }
  .block-btn:hover { color: var(--red); background: rgba(200,120,120,0.12); }

  .blocked-chip {
    padding: .35rem .8rem;
    border: 1px dashed rgba(140,160,220,0.2);
    border-radius: 20px; background: transparent;
    color: var(--text-dim); font-size: .78rem;
    cursor: pointer; transition: all .2s;
    font-family: 'Noto Serif SC', serif;
  }
  .blocked-chip:hover { border-color: var(--moon); color: var(--moon); }
  .chip-wrap { position: relative; display: inline-block; }
  .ctx-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%; transform: translateX(-50%);
    width: 320px;
    background: var(--bg3);
    border: 1px solid rgba(140,160,220,0.28);
    border-radius: 8px;
    padding: .85rem 1rem;
    font-size: .8rem; line-height: 1.85;
    color: var(--text);
    z-index: 300;
    pointer-events: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    white-space: pre-wrap;
    word-break: break-all;
  }
  .ctx-tooltip::after {
    content: '';
    position: absolute; top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: rgba(140,160,220,0.28);
  }
  .ctx-tooltip .ctx-hl {
    background: rgba(140,160,220,0.22);
    border-bottom: 1px solid rgba(140,160,220,0.55);
    border-radius: 2px; padding: 0 2px;
    color: var(--moon);
  }
  .chip-wrap:hover .ctx-tooltip { display: block; }

  /* ─── ENTRY VIEW ─── */
  .entry-meta {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem; color: var(--moon);
    letter-spacing: .15em; font-weight: 300;
    margin-bottom: .5rem;
  }
  .entry-season {
    font-size: .78rem; color: var(--text-dim);
    letter-spacing: .1em; margin-bottom: 2rem;
  }
  .entry-body {
    font-size: .92rem; line-height: 2.1;
    color: var(--text); max-width: 720px;
    white-space: pre-wrap;
  }
  .entry-body .highlight {
    background: rgba(140,160,220,0.18);
    border-bottom: 1px solid rgba(140,160,220,0.45);
    border-radius: 2px;
    padding: 0 2px;
  }

  /* ─── TIMELINE ─── */
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .tl-entry {
    display: flex; gap: 1.5rem; align-items: flex-start;
    border-bottom: 1px solid var(--border);
    cursor: default;
    border-radius: 4px; padding: .7rem .8rem;
    margin: 0 -.8rem;
    transition: background .18s;
  }
  .tl-entry:hover { background: var(--bg2); }
  .tl-date {
    min-width: 88px;
    font-family: 'Cormorant Garamond', serif;
    font-size: .95rem; color: var(--moon);
    letter-spacing: .06em; padding-top: .1rem;
  }
  .tl-preview {
    font-size: .82rem; color: var(--text-dim);
    line-height: 1.7; overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  /* ─── TOASTS ─── */
  .toast {
    position: fixed; bottom: 2rem; right: 2rem;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: .9rem 1.4rem;
    color: var(--text); font-size: .84rem;
    z-index: 999; opacity: 0;
    transform: translateY(8px);
    transition: all .3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    text-align: center; padding: 4rem 2rem;
    color: var(--text-dim); font-size: .88rem;
    line-height: 2;
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(140,160,220,0.2); border-radius: 3px; }

  /* ─── SORT BAR ─── */
  .sort-row {
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 1rem; font-size: .78rem; color: var(--text-dim);
  }
  .sort-row span { letter-spacing: .06em; }
  .sort-opt {
    cursor: pointer; padding: .3rem .7rem;
    border-radius: 4px; transition: all .18s;
    letter-spacing: .04em;
  }
  .sort-opt:hover, .sort-opt.active { color: var(--moon); background: var(--glow); }

  /* ─── FREQ BAR ─── */
  .freq-bar-wrap { margin-bottom: .4rem; }
  .freq-bar {
    height: 2px; background: linear-gradient(90deg, var(--moon), transparent);
    border-radius: 1px; opacity: .35;
    transition: width .3s;
  }


  /* ─── TIMELINE DELETE ─── */
  .tl-delete-btn {
    background: none; border: 1px solid transparent;
    color: var(--text-dim); font-size: .72rem;
    padding: .25rem .55rem; border-radius: 4px;
    cursor: pointer; opacity: 0; transition: all .18s;
    font-family: 'Noto Serif SC', serif;
    white-space: nowrap; align-self: center; flex-shrink: 0;
  }
  .tl-entry:hover .tl-delete-btn { opacity: 1; }
  .tl-delete-btn.armed {
    color: var(--red); border-color: rgba(200,120,120,0.4);
    opacity: 1; background: rgba(200,120,120,0.08);
  }

  /* ─── GROUP-EXCLUDED MEMBER ─── */
  .gexcl-card { opacity: .7; border-style: dashed; }

  /* ─── EXCLUDE DATE TOGGLE ─── */
  .excl-toggle-btn {
    font-size: .7rem; color: var(--text-dim);
    cursor: pointer; padding: 0 .2rem;
    opacity: 0; transition: opacity .15s;
    line-height: 1; vertical-align: middle;
  }
  .chip-wrap:hover .excl-toggle-btn { opacity: 1; }
  .excluded-chip {
    text-decoration: line-through;
    color: var(--text-dim) !important;
  }

  /* ─── TIMELINE DIVIDERS ─── */
  .tl-year-divider {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem; color: var(--moon);
    letter-spacing: .2em; font-weight: 300;
    padding: 1.8rem 0 .6rem;
    border-bottom: 1px solid rgba(140,160,220,0.3);
    margin-bottom: .4rem;
  }
  .tl-month-divider {
    border-top: 1px dashed rgba(140,160,220,0.1);
    margin: .5rem 0;
  }

  /* ─── STAR BUTTON ─── */
  .star-btn {
    font-size: .85rem; color: var(--text-dim);
    cursor: pointer; transition: color .15s;
    line-height: 1; padding: .1rem;
  }
  .star-btn:hover, .star-btn.starred { color: var(--gold); }

  /* ─── GROUP CARD ─── */
  .group-card { border-color: rgba(201,182,138,0.25); }
  .group-card:hover { border-color: rgba(201,182,138,0.5); background: var(--bg3); }
  .group-badge {
    display: inline-block;
    padding: .25rem .7rem;
    border: 1px solid rgba(201,182,138,0.4);
    border-radius: 12px;
    color: var(--gold); font-size: .8rem;
    cursor: pointer; transition: all .18s;
    letter-spacing: .04em;
  }
  .group-badge:hover { background: rgba(201,182,138,0.12); }

  /* ─── EDIT MODE ─── */
  .symbol-card.selected { border-color: rgba(140,160,220,0.6); background: rgba(140,160,220,0.08); }
  .group-card.selected  { border-color: rgba(201,182,138,0.6); background: rgba(201,182,138,0.08); }
  .edit-action-bar {
    display: none;
    gap: .6rem; flex-wrap: wrap; align-items: center;
    padding: .7rem 1rem;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 1rem;
    font-size: .8rem;
  }
  #selected-count { color: var(--moon); font-size: .78rem; letter-spacing: .04em; }

  /* ─── FILTER MODE CHIPS ─── */
  .filter-mode-chip {
    padding: .35rem .8rem;
    border: 1px solid var(--border);
    border-radius: 20px; background: transparent;
    color: var(--text-dim); font-size: .78rem;
    cursor: pointer; transition: all .2s;
    font-family: 'Noto Serif SC', serif;
    letter-spacing: .04em;
  }
  .filter-mode-chip:hover, .filter-mode-chip.active {
    border-color: rgba(140,160,220,0.5);
    background: var(--glow); color: var(--moon);
  }
  .filter-mode-chip[data-filter="groups"].active {
    border-color: rgba(201,182,138,0.5);
    background: rgba(201,182,138,0.1); color: var(--gold);
  }
  .filter-mode-chip[data-filter="starred"].active {
    border-color: rgba(201,182,138,0.5);
    background: rgba(201,182,138,0.1); color: var(--gold);
  }
</style>
</head>
<body>

<!-- ── NAV ────────────────────────────────────── -->
<nav>
  <div class="nav-logo" onclick="showPage('dashboard')">梦境志 <span>·</span> Dream Archive</div>
  <div class="nav-links">
    <button class="nav-btn" onclick="showPage('dashboard')" data-page="dashboard">梦境志</button>
    <button class="nav-btn" onclick="showPage('symbols')" data-page="symbols">符号志</button>
    <button class="nav-btn" onclick="showPage('timeline')" data-page="timeline">时间线</button>
    <div class="nav-sep"></div>
    <button class="nav-btn" onclick="importJSON()">导入备份</button>
    <button class="nav-btn" onclick="exportJSON()">导出备份</button>
    <div class="nav-sep"></div>
    <button class="nav-btn" onclick="rebuildAndRefresh()" title="用当前词典重新分析所有记录">重新分析</button>
    <button class="nav-btn" style="color:var(--red)" onclick="clearAllData()">清除数据</button>
  </div>
</nav>

<main>

<!-- ── LANDING ──────────────────────────────── -->
<div id="page-landing" class="page active">
  <div class="landing-moon">🌙</div>
  <div class="landing-title">梦境志<br><em>Dream Archive</em></div>
  <p class="landing-sub">梦境记录归档 · 词频统计 · 意象溯源</p>
  <div class="landing-actions">
    <button class="btn-primary" onclick="openPasteModal()">粘贴梦境文本</button>
    <button class="btn-secondary" onclick="importJSON()">导入已有备份</button>
  </div>
  <p style="font-size:.76rem;color:var(--text-dim);letter-spacing:.06em">

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
}
function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    const parsed = JSON.parse(raw);

function parseDreamText(text) {
  const blocks = text.split(/\*{3,}/).map(b => b.trim()).filter(Boolean);
  let added = 0;
  for (const block of blocks) {
    const dateMatch = block.match(/^(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
    if (!dateMatch) continue;
    const year = parseInt(dateMatch[1]);
    const month = parseInt(dateMatch[2]);
    const day = parseInt(dateMatch[3]);
    const dateKey = `${year}.${String(month).padStart(2,'0')}.${String(day).padStart(2,'0')}`;
    const content = block.replace(/^(\d{4})[.\-\/]\d{1,2}[.\-\/]\d{1,2}\s*/, '').trim();
    if (!content) continue;
    const season = getSeason(month);
    DB.entries[dateKey] = { date: dateKey, content, year, month, day, season };
    added++;
  }
  if (added > 0) { rebuildSymbols(); save(); }
  return added;
}

function getSeason(month) {
  if ([3,4,5].includes(month)) return 'spring';
  if ([6,7,8].includes(month)) return 'summer';
  if ([9,10,11].includes(month)) return 'autumn';
  return 'winter';
}

const DICT = new Set(DICT_RAW.split(/[|\n]+/).map(w => w.trim()).filter(w => w.length >= 2));
const MAX_WORD_LEN = 6;

function segmentZH(text) {
  const tokens = [];
  let i = 0;
  while (i < text.length) {
    const ch = text[i];
    if (!/[\u4e00-\u9fa5]/.test(ch)) { i++; continue; }
    let matched = false;
    for (let len = Math.min(MAX_WORD_LEN, text.length - i); len >= 2; len--) {
      const word = text.slice(i, i + len);
      if (!/^[\u4e00-\u9fa5]+$/.test(word)) continue;
      if (DICT.has(word)) { tokens.push(word); i += len; matched = true; break; }
    }
    if (!matched) { i++; }
  }
  return tokens;
}

function tokenize(text) {
  const tokens = [];
  const zhSegs = text.match(/[\u4e00-\u9fa5，。！？、；：""''（）【】…—\s]+/g) || [];
  for (const seg of zhSegs) {
    const pure = seg.replace(/[^\u4e00-\u9fa5]/g, ' ');
    for (const chunk of pure.split(/\s+/).filter(Boolean)) {
      tokens.push(...segmentZH(chunk));
    }
  }
  const enSegs = text.toLowerCase().match(/[a-z]{3,}/g) || [];
  for (const w of enSegs) {
    if (!STOP_EN.has(w)) tokens.push(w);
  }
  return tokens;
}

function rebuildSymbols() {
  const freq = {};
  for (const entry of Object.values(DB.entries)) {
    const seen = new Set();
    const tokens = tokenize(entry.content);
    for (const tok of tokens) {
      if (!freq[tok]) freq[tok] = { freq: 0, dates: [] };
      freq[tok].freq++;
      if (!seen.has(tok)) { freq[tok].dates.push(entry.date); seen.add(tok); }
    }
  }
  const candidates = Object.entries(freq).filter(([w, v]) => w.length >= 2 && v.freq >= 3);
  const words = candidates.map(([w]) => w).sort((a, b) => b.length - a.length);
  const keep = new Set();
  for (const w of words) {
    const dominated = [...keep].some(k => k.includes(w) && freq[k].freq >= freq[w].freq * 0.6);
    if (!dominated) keep.add(w);
  }
  // Preserve custom symbols and their group memberships
  const customSymbols = Object.fromEntries(
    Object.entries(DB.symbols).filter(([, v]) => v.custom)
  );
  DB.symbols = {};
  for (const [w, v] of candidates) {
    if (!keep.has(w)) continue;
    v.dates.sort((a, b) => b.localeCompare(a));
    DB.symbols[w] = { word: w, freq: v.freq, days: v.dates.length, dates: v.dates };
  }
  for (const [w, v] of Object.entries(customSymbols)) {
    if (!DB.symbols[w]) DB.symbols[w] = v;
  }
}

// ══════════════════════════════════════════════════════
// EXCLUSIVE COUNTING (always on)
// ══════════════════════════════════════════════════════
function countExclusive(word, text) {
  const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(escaped, 'g');
  const blockers = Object.keys(DB.symbols).filter(s => s !== word && s.includes(word));
  if (blockers.length === 0) return (text.match(re) || []).length;
  let count = 0;
  let m;
  while ((m = re.exec(text)) !== null) {
    const pos = m.index;
    const dominated = blockers.some(blocker => {
      const offset = blocker.indexOf(word);
      const start = pos - offset;
      if (start < 0 || start + blocker.length > text.length) return false;
      return text.slice(start, start + blocker.length) === blocker;
    });
    if (!dominated) count++;
  }
  return count;
}

function getExclusiveStats(word, validDates) {
  let days = 0, freq = 0;
  const dates = [];
  const excl = (DB.excluded || {})[word] || [];
  for (const entry of Object.values(DB.entries)) {
    if (validDates && !validDates.has(entry.date)) continue;
    if (excl.includes(entry.date)) continue; // manually excluded
    const c = countExclusive(word, entry.content);
    if (c > 0) { days++; freq += c; dates.push(entry.date); }
  }
  dates.sort((a, b) => b.localeCompare(a));
  return { days, freq, dates };
}

// ══════════════════════════════════════════════════════
// GROUPS (符号组)
// ══════════════════════════════════════════════════════
function newGroupId() {
  return 'g_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
}

function getWordGroup(word) {
  for (const g of Object.values(DB.groups)) {
    if (g.words.includes(word)) return g;
  }
  return null;
}

function getGroupStats(group, validDates) {
  const dateSet = new Set();
  let totalFreq = 0;
  const ge = (DB.groupExcluded || {})[group.id] || [];
  for (const word of group.words) {
    if (DB.blocked.includes(word)) continue;
    if (ge.includes(word)) continue; // excluded from this group's count
    const stats = getExclusiveStats(word, validDates);
    for (const d of stats.dates) dateSet.add(d);
    totalFreq += stats.freq;
  }
  const dates = [...dateSet].sort((a, b) => b.localeCompare(a));
  return { days: dates.length, freq: totalFreq, dates };
}

// NAVIGATION

function showPage(id, pushHistory) {
  if (pushHistory === undefined) pushHistory = true;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('.nav-btn[data-page]').forEach(b => {
    b.classList.toggle('active', b.dataset.page === id);
  });
  if (pushHistory && navHistory[navHistory.length - 1] !== id) navHistory.push(id);
  window.scrollTo(0, 0);
}

window.history.go = function(n) {
  if (n === -1) {
    navHistory.pop();
    const prev = navHistory[navHistory.length - 1] || 'symbols';
    showPage(prev, false);
  }
};

function toggleEditMode() {

  selectedWords.clear();
  document.getElementById('edit-mode-btn').textContent = editMode ? '完成' : '编辑';

function toggleSelectWord(word) {
  if (selectedWords.has(word)) {
    selectedWords.delete(word);
  } else {
    selectedWords.add(word);
  }
  renderSymbols();
}

function renderSymbols() {
  const search = document.getElementById('sym-search').value.trim().toLowerCase();
  const filterYear = document.getElementById('sym-year').value;
  const filterMonth = document.getElementById('sym-month').value;

  const validDates = new Set(
    Object.values(DB.entries).filter(e => {
      if (filterYear && e.year != filterYear) return false;
      if (filterMonth && e.month != filterMonth) return false;
      if (currentSeason && e.season !== currentSeason) return false;
      return true;
    }).map(e => e.date)
  );

  const blocked = DB.blocked || [];
  const starred = DB.starred || [];

  // Words that belong to a group (hide from main list in non-edit mode)
  const groupedWords = new Set();
  for (const g of Object.values(DB.groups)) {
    for (const w of g.words) groupedWords.add(w);
  }

  // --- Build groups display ---
  let groupItems = Object.values(DB.groups).map(g => {
    const stats = getGroupStats(g, validDates);
    return { ...g, days: stats.days, freq: stats.freq, dates: stats.dates, isGroup: true };
  }).filter(g => g.days > 0);

  // --- Build symbol display (ungrouped, unblocked) ---
  let symItems = Object.values(DB.symbols).map(s => {
    const ex = getExclusiveStats(s.word, validDates);
    return { ...s, days: ex.days, freq: ex.freq, dates: ex.dates };
  }).filter(s => {
    if (s.days === 0) return false;
    if (blocked.includes(s.word)) return false;
    if (!editMode && groupedWords.has(s.word)) return false;
    return true;
  });

  // Apply search
  if (search) {
    groupItems = groupItems.filter(g => g.name.toLowerCase().includes(search) ||
      g.words.some(w => w.toLowerCase().includes(search)));
    symItems = symItems.filter(s => s.word.toLowerCase().includes(search));
  }

  // Apply filter mode
  if (currentFilter === 'starred') {
    groupItems = groupItems.filter(g => starred.includes(g.id));
    symItems = symItems.filter(s => starred.includes(s.word));
  } else if (currentFilter === 'groups') {
    symItems = [];
  }

  // Sort
  const sortFn = (a, b) => {
    const aKey = a.isGroup ? a.name : a.word;
    const bKey = b.isGroup ? b.name : b.word;
    if (currentSymbolSort === 'freq') return b.days - a.days || b.freq - a.freq;
    if (currentSymbolSort === 'recent') return (b.dates[0] || '').localeCompare(a.dates[0] || '');
    return aKey.localeCompare(bKey, 'zh');
  };
  // Merge groups and symbols into one list, sort together
  const allItems = [...groupItems, ...symItems];
  allItems.sort(sortFn);

  const totalCount = allItems.length;
  document.getElementById('sym-count-label').textContent =
    `${symItems.length} 个符号 · ${groupItems.length} 个符号组${blocked.length ? ' · ' + blocked.length + ' 已屏蔽' : ''}`;

  // Update selected count display
  document.getElementById('selected-count').textContent = selectedWords.size > 0 ? `已选 ${selectedWords.size}` : '';

  if (totalCount === 0) {
    document.getElementById('symbols-grid').innerHTML = '<div class="empty-state">当前筛选条件下无符号</div>';
  } else {
    document.getElementById('symbols-grid').innerHTML = allItems.map(item =>
      item.isGroup ? renderGroupCard(item) : renderSymbolCard(item)
    ).join('');
  }

  // Blocked panel
  const blockedPanel = document.getElementById('blocked-panel');
  if (blocked.length === 0) {
    blockedPanel.style.display = 'none';
  } else {
    blockedPanel.style.display = 'block';
    document.getElementById('blocked-chips').innerHTML = blocked.map(w => `
      <span class="blocked-chip" onclick="unblockSymbol('${esc(w)}')" title="点击恢复">
        ${esc(w)} <span style="opacity:.5;font-size:.7rem">↩</span>
      </span>
    `).join('');
  }
}

function renderGroupCard(g) {
  const isStarred = (DB.starred || []).includes(g.id);
  const isSelected = selectedWords.has(g.id);
  return `<div class="symbol-card group-card${isSelected ? ' selected' : ''}"
    onclick="${editMode ? `toggleSelectWord('${esc(g.id)}')` : `openGroup('${esc(g.id)}')`}"
    style="padding-right:.6rem">
    ${editMode ? `<input type="checkbox" class="sym-checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation();toggleSelectWord('${esc(g.id)}')" style="margin-right:.5rem;accent-color:var(--gold)">` : ''}
    <span class="symbol-word" style="color:var(--gold)">${esc(g.name)}</span>
    <span style="display:flex;align-items:center;gap:.4rem">
      <span class="symbol-count" style="font-size:.8rem;opacity:.8;color:var(--gold)">${g.days}d · ${g.freq}×</span>
      <span class="star-btn${isStarred ? ' starred' : ''}" title="${isStarred ? '取消星标' : '星标'}"
        onclick="event.stopPropagation();toggleStar('${esc(g.id)}')">${isStarred ? '★' : '☆'}</span>
    </span>
  </div>`;
}

function renderSymbolCard(s) {
  const isStarred = (DB.starred || []).includes(s.word);
  const isSelected = editMode && selectedWords.has(s.word);
  return `<div class="symbol-card${isSelected ? ' selected' : ''}"
    onclick="${editMode ? `toggleSelectWord('${esc(s.word)}')` : `openSymbol('${esc(s.word)}')`}"
    style="padding-right:.6rem">
    ${editMode ? `<input type="checkbox" class="sym-checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation();toggleSelectWord('${esc(s.word)}')" style="margin-right:.5rem;accent-color:var(--moon)">` : ''}
    <span class="symbol-word">${esc(s.word)}</span>
    <span style="display:flex;align-items:center;gap:.4rem">
      <span class="symbol-count" style="font-size:.85rem;opacity:.8">${s.days}d · ${s.freq}×</span>
      <span class="star-btn${isStarred ? ' starred' : ''}" title="${isStarred ? '取消星标' : '星标'}"
        onclick="event.stopPropagation();toggleStar('${esc(s.word)}')">${isStarred ? '★' : '☆'}</span>
      ${!editMode ? `<span class="block-btn" title="屏蔽" onclick="event.stopPropagation();blockSymbol('${esc(s.word)}')">✕</span>` : ''}
    </span>
  </div>`;
}

// STAR
// ══════════════════════════════════════════════════════
function toggleStar(key) {
  if (!DB.starred) DB.starred = [];
  const idx = DB.starred.indexOf(key);
  if (idx === -1) {
    DB.starred.push(key);
    toast('已加星标');
  } else {
    DB.starred.splice(idx, 1);
    toast('已取消星标');
  }
  save();
  renderSymbols();
}

// ══════════════════════════════════════════════════════
// BLOCK
// ══════════════════════════════════════════════════════
function blockSymbol(word) {
  if (!DB.blocked) DB.blocked = [];
  if (!DB.blocked.includes(word)) DB.blocked.push(word);
  save(); renderSymbols(); toast(`「${word}」已屏蔽`);
}

function unblockSymbol(word) {
  DB.blocked = (DB.blocked || []).filter(w => w !== word);
  save(); renderSymbols(); toast(`「${word}」已恢复`);
}

// ══════════════════════════════════════════════════════
// EDIT MODE ACTIONS
// ══════════════════════════════════════════════════════
function batchBlock() {
  if (selectedWords.size === 0) return;
  const words = [...selectedWords].filter(k => !k.startsWith('g_'));
  for (const w of words) {
    if (!DB.blocked.includes(w)) DB.blocked.push(w);
  }
  selectedWords.clear();
  save(); renderSymbols(); toast(`已屏蔽 ${words.length} 个符号`);
}

let _pickerPendingWords = [];
let _pickerTargetGroupId = null; // if set, directly add to this group (add-members mode)

function openGroupPicker(words, targetGroupId) {
  _pickerPendingWords = words || [];
  _pickerTargetGroupId = targetGroupId || null;
  document.getElementById('group-picker-new-name').value = '';
  document.getElementById('group-picker-title').textContent =
    _pickerTargetGroupId ? '添加成员到符号组' : '加入符号组';

  // In add-members mode with a target group: show a symbol search to pick which symbols to add
  if (_pickerTargetGroupId) {
    const g = DB.groups[_pickerTargetGroupId];
    const available = Object.values(DB.symbols)
      .filter(s => !g.words.includes(s.word) && !(DB.blocked||[]).includes(s.word))
      .sort((a,b) => b.freq - a.freq);
    document.getElementById('group-picker-list').innerHTML = available.length === 0
      ? '<div style="color:var(--text-dim);font-size:.82rem;padding:.4rem 0">没有可添加的符号</div>'
      : available.map(s => `
        <div class="symbol-card" style="cursor:pointer;padding:.7rem 1rem"
          onclick="pickerAddMember('${esc(s.word)}')">
          <span>${esc(s.word)}</span>
          <span style="font-size:.78rem;color:var(--text-dim)">${s.days || s.freq}d</span>
        </div>`).join('');
    document.getElementById('group-picker-modal').classList.add('open');
    return;
  }

  // Normal mode: show existing groups to pick
  const groups = Object.values(DB.groups);
  const listEl = document.getElementById('group-picker-list');
  if (groups.length === 0) {
    listEl.innerHTML = '<div style="color:var(--text-dim);font-size:.82rem;padding:.4rem 0">暂无符号组，在下方新建</div>';
  } else {
    listEl.innerHTML = groups.map(g => `
      <div class="symbol-card group-card" style="cursor:pointer;padding:.7rem 1rem"
        onclick="pickerSelectGroup('${esc(g.id)}')">
        <span style="color:var(--gold)">${esc(g.name)}</span>
        <span style="font-size:.78rem;color:var(--text-dim)">${g.words.length} 个符号</span>
      </div>
    `).join('');
  }
  document.getElementById('group-picker-modal').classList.add('open');
}

function openGroup(groupId) {
  const g = DB.groups[groupId];
  if (!g) return;

  // Sync filters from symbols page when entering fresh
  if (navHistory[navHistory.length - 1] !== 'group-detail') {
    detailFilterYear  = document.getElementById('sym-year').value;
    detailFilterMonth = document.getElementById('sym-month').value;
    detailFilterSeason = currentSeason;
  }

  document.getElementById('group-detail-name').textContent = g.name;
  const isStarred = (DB.starred || []).includes(g.id);
  document.getElementById('group-detail-star').textContent = isStarred ? '★' : '☆';
  document.getElementById('group-detail-star').classList.toggle('starred', isStarred);
  document.getElementById('group-detail-star').onclick = function() { toggleStar(g.id); openGroup(groupId); };

  const validDates = getDetailValidDates();
  const ge = (DB.groupExcluded || {})[groupId] || [];
  const memberHtml = g.words.map(w => {
    const s = DB.symbols[w];
    if (!s) return '';
    const isGExcl = ge.includes(w);
    const ex = isGExcl ? null : getExclusiveStats(w, validDates);
    return `<div class="symbol-card${isGExcl ? ' gexcl-card' : ''}" style="cursor:default">
      <span class="symbol-word" onclick="openSymbol('${esc(w)}')" style="cursor:pointer;${isGExcl ? 'opacity:.45;text-decoration:line-through' : ''}">${esc(w)}</span>
      <span style="display:flex;align-items:center;gap:.55rem">
        ${!isGExcl ? `<span class="symbol-count" style="font-size:.82rem">${ex.days}d · ${ex.freq}×</span>` : `<span style="font-size:.74rem;color:var(--text-dim);letter-spacing:.04em">不计入组</span>`}
        <span class="excl-toggle-btn" style="opacity:1;font-size:.8rem" title="${isGExcl ? '重新计入此组' : '从此组计数排除'}"
          onclick="toggleGroupExclude('${esc(groupId)}','${esc(w)}')">${isGExcl ? '⊕' : '⊖'}</span>
        <span style="font-size:.75rem;color:var(--text-dim);cursor:pointer" onclick="removeMemberFromGroup('${esc(groupId)}','${esc(w)}')" title="从组内移除">✕</span>
      </span>
    </div>`;
  }).join('');

  // Filter label if active
  const filterLabel = (detailFilterYear || detailFilterMonth || detailFilterSeason)
    ? `<div style="font-size:.76rem;color:var(--text-dim);letter-spacing:.04em;margin-bottom:1rem">
        筛选中：${detailFilterYear ? detailFilterYear+'年 ' : ''}${detailFilterMonth ? detailFilterMonth+'月 ' : ''}${detailFilterSeason ? {spring:'春',summer:'夏',autumn:'秋',winter:'冬'}[detailFilterSeason] : ''}
        <span style="cursor:pointer;color:var(--moon);margin-left:.5rem" onclick="clearDetailFilter();openGroup('${esc(groupId)}')">✕ 清除</span>
      </div>`
    : '';

  document.getElementById('group-detail-members').innerHTML = filterLabel + (memberHtml ||
    '<div class="empty-state" style="padding:2rem">组内暂无符号</div>');
  document.getElementById('group-detail-edit').onclick = function() {
    openGroupPicker([], groupId);
  };

  showPage('group-detail');
}

function removeMemberFromGroup(groupId, word) {
  const g = DB.groups[groupId];
  if (!g) return;
  const idx = g.words.indexOf(word);
  if (idx === -1) return;
  g.words.splice(idx, 1);
  // Also clean up groupExcluded entry for this word
  if (DB.groupExcluded && DB.groupExcluded[groupId]) {
    DB.groupExcluded[groupId] = DB.groupExcluded[groupId].filter(w => w !== word);
  }
  if (g.words.length === 0) {
    delete DB.groups[groupId];
    delete DB.groupExcluded[groupId];
    save(); renderSymbols(); showPage('symbols'); toast('符号组已无成员，已自动解散');
    return;
  }
  save(); openGroup(groupId); toast(`「${word}」已从组内移除`);
}

function toggleGroupExclude(groupId, word) {
  if (!DB.groupExcluded) DB.groupExcluded = {};
  if (!DB.groupExcluded[groupId]) DB.groupExcluded[groupId] = [];
  const arr = DB.groupExcluded[groupId];
  const idx = arr.indexOf(word);
  if (idx === -1) {
    arr.push(word);
    toast(`「${word}」已从组内计数排除，在符号志中正常显示`);
  } else {
    arr.splice(idx, 1);
    if (arr.length === 0) delete DB.groupExcluded[groupId];
    toast(`「${word}」已重新计入符号组`);
  }
  save(); renderSymbols(); openGroup(groupId);
}

function getContextSnippet(date, word) {
  const entry = DB.entries[date];
  if (!entry) return '';
  const text = entry.content;
  const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(escaped, 'g');
  const CONTEXT = 18;
  const blockers = Object.keys(DB.symbols).filter(s => s !== word && s.includes(word));
  const snippets = [];
  let m;
  while ((m = re.exec(text)) !== null && snippets.length < 3) {
    const pos = m.index;
    const dominated = blockers.some(blocker => {
      const offset = blocker.indexOf(word);
      const start = pos - offset;
      if (start < 0 || start + blocker.length > text.length) return false;
      return text.slice(start, start + blocker.length) === blocker;
    });
    if (dominated) continue; // skip dominated hits entirely
    const start = Math.max(0, pos - CONTEXT);
    const end = Math.min(text.length, pos + word.length + CONTEXT);
    const pre = esc(text.slice(start, pos));
    const hit = esc(word);
    const post = esc(text.slice(pos + word.length, end));
    const prefix = start > 0 ? '…' : '';
    const suffix = end < text.length ? '…' : '';
    snippets.push(`${prefix}${pre}<span class="ctx-hl">${hit}</span>${post}${suffix}`);
  }
  return snippets.join('<br><br>');
}

function populateDetailFilters() {
  const years = [...new Set(Object.values(DB.entries).map(e => e.year))].sort((a,b) => b-a);
  document.getElementById('detail-year').innerHTML = '<option value="">全部年份</option>' +
    years.map(y => `<option value="${y}"${detailFilterYear==y?' selected':''}>${y}</option>`).join('');
  const months = [...new Set(Object.values(DB.entries).map(e => e.month))].sort((a,b) => a-b);
  document.getElementById('detail-month').innerHTML = '<option value="">全部月份</option>' +
    months.map(m => `<option value="${m}"${detailFilterMonth==m?' selected':''}>${m}月</option>`).join('');
  document.querySelectorAll('#detail-filter-bar .filter-chip[data-dseason]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.dseason === detailFilterSeason);
  });
}

function setDetailSeason(el) {
  detailFilterSeason = el.dataset.dseason;
  document.querySelectorAll('#detail-filter-bar .filter-chip[data-dseason]').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  const word = document.getElementById('detail-word').textContent;
  if (word) renderDetailDates(word);
}

function refreshDetailView() {
  detailFilterYear = document.getElementById('detail-year').value;
  detailFilterMonth = document.getElementById('detail-month').value;
  const word = document.getElementById('detail-word').textContent;
  if (word) renderDetailDates(word);
}

function clearDetailFilter() {
  detailFilterYear = ''; detailFilterMonth = ''; detailFilterSeason = '';
}

function getDetailValidDates() {
  return new Set(Object.values(DB.entries).filter(e => {
    if (detailFilterYear && e.year != detailFilterYear) return false;
    if (detailFilterMonth && e.month != detailFilterMonth) return false;
    if (detailFilterSeason && e.season !== detailFilterSeason) return false;
    return true;
  }).map(e => e.date));
}

function renderDetailDates(word) {
  const validDates = getDetailValidDates();
  const excl = (DB.excluded || {})[word] || [];
  const ex = getExclusiveStats(word, validDates);
  document.getElementById('detail-freq').textContent = `${ex.days} 天 · ${ex.freq} 次`;

  // All dates where word appears (pre-exclusion), filtered by validDates
  const allDates = Object.values(DB.entries)
    .filter(e => {
      if (validDates && !validDates.has(e.date)) return false;
      return countExclusive(word, e.content) > 0;
    })
    .map(e => e.date)
    .sort((a,b) => b.localeCompare(a));

  const SEASON_ZH = { spring:'春', summer:'夏', autumn:'秋', winter:'冬' };
  const monthGroups = {};
  for (const d of allDates) {
    const [y, mo] = d.split('.');
    const key = `${y}.${mo}`;
    if (!monthGroups[key]) monthGroups[key] = [];
    monthGroups[key].push(d);
  }

  // Group membership badge
  const group = getWordGroup(word);
  const groupBadge = group
    ? `<div style="margin-bottom:1.5rem">
        <span style="font-size:.78rem;color:var(--text-dim)">所属符号组：</span>
        <span class="group-badge" onclick="openGroup('${esc(group.id)}')">${esc(group.name)} →</span>
       </div>`
    : '';

  let html = groupBadge;
  for (const [ym, dates] of Object.entries(monthGroups).sort((a,b) => b[0].localeCompare(a[0]))) {
    const [y, mo] = ym.split('.');
    const season = SEASON_ZH[getSeason(parseInt(mo))];
    html += `<div class="month-section">
      <div class="month-label">${y} 年 ${parseInt(mo)} 月 · ${season}</div>
      <div class="date-chips">
        ${dates.map(d => {
          const isExcluded = excl.includes(d);
          const snippet = getContextSnippet(d, word);
          return `<span class="chip-wrap" style="${isExcluded ? 'opacity:.4' : ''}">
            <span class="date-chip${isExcluded ? ' excluded-chip' : ''}"
              onclick="openEntryFromSymbol('${esc(d)}','${esc(word)}')">${d}</span>
            <span class="excl-toggle-btn" title="${isExcluded ? '重新计入' : '从计数排除'}"
              onclick="event.stopPropagation();toggleExcludeDate('${esc(word)}','${esc(d)}')">${isExcluded ? '⊕' : '⊖'}</span>
            ${snippet && !isExcluded ? `<div class="ctx-tooltip">${snippet}</div>` : ''}
          </span>`;
        }).join('')}
      </div>
    </div>`;
  }
  document.getElementById('detail-dates').innerHTML = html ||
    '<div class="empty-state">当前筛选条件下无出现记录</div>';
}

function openSymbol(word) {
  const s = DB.symbols[word];
  if (!s) return;

  // Sync filters from symbols page when entering fresh (not from toggleExcludeDate)
  const comingFromSymbols = navHistory[navHistory.length - 1] !== 'symbol-detail';
  if (comingFromSymbols) {
    detailFilterYear  = document.getElementById('sym-year').value;
    detailFilterMonth = document.getElementById('sym-month').value;
    detailFilterSeason = currentSeason;
  }

  document.getElementById('detail-word').textContent = word;
  populateDetailFilters();

  // Back button
  const fromGroup = navHistory[navHistory.length - 1] === 'group-detail';
  document.querySelector('#page-symbol-detail .back-btn').textContent =
    fromGroup ? '← 返回符号组' : '← 返回符号志';
  document.querySelector('#page-symbol-detail .back-btn').onclick =
    fromGroup ? function() { history.go(-1); } : function() { showPage('symbols'); };

  renderDetailDates(word);
  showPage('symbol-detail');
}

function toggleExcludeDate(word, date) {
  if (!DB.excluded) DB.excluded = {};
  if (!DB.excluded[word]) DB.excluded[word] = [];
  const idx = DB.excluded[word].indexOf(date);
  if (idx === -1) {
    DB.excluded[word].push(date);
  } else {
    DB.excluded[word].splice(idx, 1);
    if (DB.excluded[word].length === 0) delete DB.excluded[word];
  }
  save();
  // Re-render only the dates area — no page navigation, no scroll jump
  const scrollY = window.scrollY;
  renderDetailDates(word);
  window.scrollTo(0, scrollY);
}

function addCurrentSymbolToGroup() {

  openGroupPicker([word]);
}

function openEntryFromSymbol(date, word) {

}

const SEASON_NAMES = { spring: '春·', summer: '夏·', autumn: '秋·', winter: '冬·' };
let currentEntryDate = null;

function openEntry(date, highlightWord) {
  const e = DB.entries[date];
  if (!e) return;
  currentEntryDate = date;
  document.getElementById('entry-date').textContent = date;
  document.getElementById('entry-season').textContent =
    (SEASON_NAMES[e.season] || '') + ['一','二','三','四','五','六','七','八','九','十','十一','十二'][e.month - 1] + '月';
  let body = esc(e.content);
  if (highlightWord) {
    const hw = esc(highlightWord);
    body = body.replace(new RegExp(hw, 'g'), `<span class="highlight">${hw}</span>`);
  }
  document.getElementById('entry-body').innerHTML = body;
  showPage('entry');
}

function openEditContent() {
  if (!currentEntryDate) return;
  document.getElementById('edit-content-date').textContent = currentEntryDate;
  document.getElementById('edit-content-input').value = DB.entries[currentEntryDate].content;
  document.getElementById('edit-content-modal').classList.add('open');
}

function closeEditContentModal() {
  document.getElementById('edit-content-modal').classList.remove('open');
}

function confirmEditContent() {
  const newContent = document.getElementById('edit-content-input').value.trim();
  if (!newContent) { toast('内容不能为空', true); return; }
  DB.entries[currentEntryDate].content = newContent;
  rebuildSymbols();
  save();
  closeEditContentModal();
  openEntry(currentEntryDate);
  renderDashboard(); renderTimeline();
  toast('内容已保存，符号已重新分析');
}

function openEditDate() {
  if (!currentEntryDate) return;
  document.getElementById('edit-date-current').textContent = currentEntryDate;
  document.getElementById('edit-date-input').value = currentEntryDate;
  document.getElementById('edit-date-modal').classList.add('open');
  setTimeout(function() { document.getElementById('edit-date-input').select(); }, 50);
}

function closeEditDateModal() {
  document.getElementById('edit-date-modal').classList.remove('open');
}

function confirmEditDate() {
  const raw = document.getElementById('edit-date-input').value.trim();
  const m = raw.match(/^(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})$/);
  if (!m) { toast('格式不正确，请用 yyyy.mm.dd', true); return; }
  const year = parseInt(m[1]), month = parseInt(m[2]), day = parseInt(m[3]);
  const newDate = `${year}.${String(month).padStart(2, '0')}.${String(day).padStart(2, '0')}`;
  if (newDate === currentEntryDate) { closeEditDateModal(); return; }
  if (DB.entries[newDate]) { toast('该日期已存在记录，无法覆盖', true); return; }
  const entry = { ...DB.entries[currentEntryDate], date: newDate, year, month, day, season: getSeason(month) };
  delete DB.entries[currentEntryDate];
  DB.entries[newDate] = entry;
  for (const sym of Object.values(DB.symbols)) {
    const idx = sym.dates.indexOf(currentEntryDate);
    if (idx !== -1) { sym.dates[idx] = newDate; sym.dates.sort((a, b) => b.localeCompare(a)); }
  }
  const oldDate = currentEntryDate;
  currentEntryDate = newDate;
  save();
  closeEditDateModal();
  renderDashboard(); renderTimeline();
  document.getElementById('entry-date').textContent = newDate;
  document.getElementById('entry-season').textContent =
    (SEASON_NAMES[entry.season] || '') + ['一','二','三','四','五','六','七','八','九','十','十一','十二'][month - 1] + '月';
  toast(`日期已从 ${oldDate} 更新为 ${newDate}`);
}

// ══════════════════════════════════════════════════════
// TIMELINE
// ══════════════════════════════════════════════════════
let _tlDeletePending = null;
let _tlDeleteTimer = null;

function tlDeleteClick(date, el) {
  if (_tlDeletePending === date) {
    // Second click — confirm
    clearTimeout(_tlDeleteTimer);
    _tlDeletePending = null;
    deleteEntry(date);
  } else {
    // First click — arm
    if (_tlDeletePending && _tlDeleteTimer) {
      clearTimeout(_tlDeleteTimer);
      const prev = document.querySelector(`.tl-delete-btn[data-date="${_tlDeletePending}"]`);
      if (prev) { prev.textContent = '删除'; prev.classList.remove('armed'); }
    }
    _tlDeletePending = date;
    el.textContent = '确认';
    el.classList.add('armed');
    _tlDeleteTimer = setTimeout(function() {
      el.textContent = '删除'; el.classList.remove('armed');
      _tlDeletePending = null;
    }, 3000);
  }
}

function deleteEntry(date) {
  delete DB.entries[date];
  // Remove date from all symbol records
  for (const sym of Object.values(DB.symbols)) {
    sym.dates = sym.dates.filter(d => d !== date);
  }
  rebuildSymbols();
  save(); renderDashboard(); renderTimeline();
  toast(`${date} 已删除`);
}

function renderTimeline() {
  const entries = Object.values(DB.entries).sort((a, b) => b.date.localeCompare(a.date));
  if (entries.length === 0) {
    document.getElementById('timeline-list').innerHTML = '<div class="empty-state">尚无记录</div>';
    return;
  }
  let html = '';
  let lastYear = null, lastMonth = null;
  for (const e of entries) {
    if (e.year !== lastYear) {
      html += `<div class="tl-year-divider">${e.year}</div>`;
      lastYear = e.year; lastMonth = null;
    }
    if (e.month !== lastMonth) {
      if (lastMonth !== null) html += `<div class="tl-month-divider"></div>`;
      lastMonth = e.month;
    }
    html += `<div class="tl-entry">
      <div class="tl-date" onclick="openEntry('${e.date}')" style="cursor:pointer">${e.date}</div>
      <div class="tl-preview" onclick="openEntry('${e.date}')" style="cursor:pointer">${esc(e.content.slice(0, 150))}</div>
      <button class="tl-delete-btn" data-date="${e.date}" onclick="event.stopPropagation();tlDeleteClick('${e.date}',this)">删除</button>
    </div>`;
  }
  document.getElementById('timeline-list').innerHTML = html;
}

function processPaste() {
  const text = document.getElementById('paste-area').value.trim();
  if (!text) { toast('请先粘贴梦境文本', true); return; }
  const n = parseDreamText(text);
  if (n === 0) {
    toast('未识别到有效条目，请检查格式', true);
  } else {
    closePasteModal();
    toast(`已归档 ${n} 条梦境记录`);
    populateFilters();
    renderDashboard();
    renderTimeline();
    if (document.getElementById('page-symbols').classList.contains('active')) renderSymbols();
    if (document.getElementById('page-landing').classList.contains('active')) showPage('dashboard');
  }
}

// ══════════════════════════════════════════════════════
// REBUILD & CLEAR
// ══════════════════════════════════════════════════════
function rebuildAndRefresh() {
  if (Object.keys(DB.entries).length === 0) { toast('暂无记录', true); return; }
  rebuildSymbols();
  // Re-sync custom symbols
  for (const g of Object.values(DB.groups)) {
    for (const word of g.words) {
      if (!DB.symbols[word]) {
        let totalFreq = 0; const dates = [];
        for (const entry of Object.values(DB.entries)) {
          const count = (entry.content.match(new RegExp(word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g')) || []).length;
          if (count > 0) { totalFreq += count; dates.push(entry.date); }
        }
        dates.sort((a, b) => b.localeCompare(a));
        if (totalFreq > 0) DB.symbols[word] = { word, freq: totalFreq, days: dates.length, dates, custom: true };
      }
    }
  }
  save();
  populateFilters(); renderDashboard(); renderTimeline(); renderSymbols();
  toast('已用最新词典重新分析');
}

function clearAllData() {
  if (!confirm('确定要清除所有本地数据吗？此操作无法撤销。\n建议先导出备份。')) return;
  DB = { entries: {}, symbols: {}, blocked: [], starred: [], groups: {}, excluded: {}, groupExcluded: {} };
  localStorage.removeItem(STORAGE_KEY);
  showPage('landing', false);
  navHistory = [];
  toast('已清除全部数据');
}

function searchCustomWord() {
  const input = document.getElementById('custom-word-input');
  const word = input.value.trim();
  const resultBox = document.getElementById('custom-search-result');
  if (!word) { resultBox.style.display = 'none'; return; }
  const hits = Object.values(DB.entries).filter(e => e.content.includes(word))
    .sort((a, b) => b.date.localeCompare(a.date));
  if (hits.length === 0) {
    resultBox.style.display = 'block';
    resultBox.innerHTML = `<span style="color:var(--text-dim)">「${esc(word)}」在全部记录中未找到。</span>`;
    return;
  }
  const alreadyExists = !!DB.symbols[word];
  const datesHtml = hits.map(e =>
    `<span class="date-chip" onclick="openEntryFromSymbol('${esc(e.date)}','${esc(word)}')" style="display:inline-block;margin:.2rem .3rem .2rem 0">${e.date}</span>`
  ).join('');
  resultBox.style.display = 'block';
  resultBox.innerHTML = `
    <div style="display:flex;align-items:baseline;gap:1rem;margin-bottom:.8rem;flex-wrap:wrap">
      <span style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--moon);letter-spacing:.1em">${esc(word)}</span>
      <span style="color:var(--text-dim);font-size:.8rem">出现于 ${hits.length} 条记录</span>
      ${alreadyExists
        ? `<span style="color:var(--gold);font-size:.78rem;letter-spacing:.06em">✓ 已在符号库中</span>`
        : `<button class="btn-primary" style="padding:.35rem .9rem;font-size:.78rem" onclick="addCustomSymbol('${esc(word)}')">加入符号库</button>`
      }
    </div>
    <div>${datesHtml}</div>
  `;
}

function addCustomSymbol(word) {
  let totalFreq = 0;
  const dates = [];
  for (const entry of Object.values(DB.entries)) {
    const count = (entry.content.match(new RegExp(word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g')) || []).length;
    if (count > 0) { totalFreq += count; dates.push(entry.date); }
  }
  dates.sort((a, b) => b.localeCompare(a));
  DB.symbols[word] = { word, freq: totalFreq, days: dates.length, dates, custom: true };
  save();
  renderSymbols();
  toast(`「${word}」已加入符号库`);
  searchCustomWord();
}

// ══════════════════════════════════════════════════════
// EXPORT / IMPORT
// ══════════════════════════════════════════════════════
function exportJSON() {
  if (Object.keys(DB.entries).length === 0) { toast('暂无数据可导出', true); return; }
  const blob = new Blob([JSON.stringify(DB, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `梦境志备份_${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  toast('备份文件已下载');
}

function importJSON() {
  document.getElementById('import-file').click();
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.entries) throw new Error('invalid');
      DB.entries = Object.assign({}, DB.entries, data.entries);
      if (data.symbols) DB.symbols = Object.assign({}, DB.symbols, data.symbols);
      if (data.blocked) DB.blocked = [...new Set([...(DB.blocked || []), ...data.blocked])];
      if (data.starred) DB.starred = [...new Set([...(DB.starred || []), ...data.starred])];
      if (data.groups) DB.groups = Object.assign({}, DB.groups, data.groups);
      if (data.excluded) DB.excluded = Object.assign({}, DB.excluded, data.excluded);
      if (data.groupExcluded) DB.groupExcluded = Object.assign({}, DB.groupExcluded, data.groupExcluded);
      rebuildSymbols();
      save();
      populateFilters(); renderDashboard(); renderTimeline();
      toast(`导入成功，共 ${Object.keys(DB.entries).length} 条记录`);
      if (document.getElementById('page-landing').classList.contains('active')) showPage('dashboard');
    } catch (err) {
      toast('文件格式错误，导入失败', true);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ══════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════
let toastTimer;
function toast(msg, isErr) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = isErr ? 'rgba(200,120,120,0.4)' : 'var(--border)';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2800);
}

// ══════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
load();

const originalShowPage = showPage;
window.showPage = function(id, pushHistory) {
  originalShowPage(id, pushHistory);
  if (id === 'dashboard') renderDashboard();
  if (id === 'symbols') { populateFilters(); renderSymbols(); }
  if (id === 'timeline') renderTimeline();
};

if (Object.keys(DB.entries).length > 0) {
  populateFilters();
  showPage('dashboard', true);
} else {
  showPage('landing', true);
}

document.getElementById('group-picker-modal').addEventListener('click', function(e) {
  if (e.target === this) closeGroupPicker();
});
document.getElementById('edit-content-modal').addEventListener('click', function(e) {
  if (e.target === this) closeEditContentModal();
});
document.getElementById('edit-date-modal').addEventListener('click', function(e) {
  if (e.target === this) closeEditDateModal();
});
document.getElementById('paste-modal').addEventListener('click', function(e) {
  if (e.target === this) closePasteModal();
});
</script>
