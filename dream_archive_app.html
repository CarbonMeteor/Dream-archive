<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Dream Archive v2</title>
<style>
body{font-family:system-ui,Arial;margin:0;background:#f3f4f6}
header{background:#111;color:white;padding:16px 24px;font-size:20px}
main{padding:24px;max-width:1200px;margin:auto}
section{background:white;padding:20px;border-radius:10px;margin-bottom:20px;box-shadow:0 2px 6px rgba(0,0,0,0.08)}
textarea{width:100%;height:180px;font-size:14px}
button{margin:6px 4px;padding:8px 14px;border:none;border-radius:6px;background:#111;color:white;cursor:pointer}
button.secondary{background:#555}
input[type=file]{margin-top:8px}
#symbols{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.card{background:#fafafa;padding:12px;border-radius:8px;border:1px solid #ddd}
.card h4{margin:0 0 6px 0;font-size:16px}
.card small{color:#555}
.searchBox{width:100%;padding:8px;font-size:14px;margin-bottom:12px}
ul{margin:6px 0;padding-left:18px}
.stats{display:flex;gap:20px;font-size:14px;flex-wrap:wrap}
#network{max-height:320px;overflow:auto;font-size:13px}
</style>
</head>
<body>

<header>Dream Archive v2</header>

<main>

<section>
<h3>导入梦境记录</h3>
<p>格式：yyyy.mm.dd 开头，不同梦境之间用 *** 分割</p>
<textarea id="dreamInput"></textarea>
<br>
<button onclick="parseInput()">解析梦境</button>
<input type="file" id="fileInput">
<button class="secondary" onclick="importTextFile()">读取文件</button>
</section>

<section>
<h3>搜索梦境</h3>
<input class="searchBox" id="searchBox" placeholder="输入关键词搜索梦境" oninput="searchDreams()">
<div id="searchResults"></div>
</section>

<section>
<h3>统计信息</h3>
<div class="stats" id="stats"></div>
</section>

<section>
<h3>符号词典（高频）</h3>
<div id="symbols"></div>
</section>

<section>
<h3>象征关系网络（共现）</h3>
<div id="network"></div>
</section>

<section>
<h3>数据库导出 / 导入</h3>
<button onclick="exportDatabase()">导出数据库</button>
<input type="file" id="dbFile">
<button class="secondary" onclick="importDatabase()">导入数据库</button>
</section>

</main>

<script>

let dreams=[]
let symbols={}
let relations={}

const stopwords=["的","了","我","在","是","有","和","也","就","都","而","一个","没有","我们","你","他们","她们","因为","所以","然后","感觉","看到","发现"]

const dictionary=["学校","教室","走廊","房间","门","窗","楼梯","老师","同学","考试","医院","医生","动物","狗","猫","蛇","血","骨头","肉","爆炸","火","水","海","河","森林","城市","车","火车","飞机","父亲","母亲","孩子","婴儿","尸体"]

function tokenize(text){

 text=text.replace(/[0-9]/g,'')
 text=text.replace(/[.,，。!?！？:：;；()（）\n]/g,' ')

 const words=[]

 dictionary.forEach(w=>{
  if(text.includes(w)){
   const count=(text.split(w).length-1)
   for(let i=0;i<count;i++) words.push(w)
   text=text.replaceAll(w,' ')
  }
 })

 text.split(/\s+/).forEach(w=>{
  if(w.length>=2 && !stopwords.includes(w)) words.push(w)
 })

 return words
}

function parseInput(){
 const raw=document.getElementById("dreamInput").value
 if(!raw.trim()) return

 const entries=raw.split("***")

 entries.forEach(e=>{

  const match=e.match(/(\d{4}\.\d{1,2}\.\d{1,2})/)
  const date=match?match[1]:"unknown"

  const text=e.replace(/\d{4}\.\d{1,2}\.\d{1,2}/,'').trim()

  const tokens=tokenize(text)

  const dream={date,text,tokens}

  dreams.push(dream)

  const unique=[...new Set(tokens)]

  tokens.forEach(t=>{
   if(!symbols[t]){
    symbols[t]={count:0,dreams:[]}
   }

   symbols[t].count++

   if(symbols[t].dreams.length<5){
    symbols[t].dreams.push(date)
   }
  })

  for(let i=0;i<unique.length;i++){
   for(let j=i+1;j<unique.length;j++){

    const key=[unique[i],unique[j]].sort().join("|")

    if(!relations[key]) relations[key]=0

    relations[key]++

   }
  }

 })

 render()
}

function render(){
 renderStats()
 renderSymbols()
 renderNetwork()
}

function renderStats(){
 const stat=document.getElementById("stats")
 const totalWords=Object.values(symbols).reduce((a,b)=>a+b.count,0)

 stat.innerHTML=`梦境数量: ${dreams.length} | 符号数量: ${Object.keys(symbols).length} | 总词频: ${totalWords}`
}

function renderSymbols(){
 const container=document.getElementById("symbols")
 container.innerHTML=""

 const sorted=Object.entries(symbols)
 .sort((a,b)=>b[1].count-a[1].count)
 .slice(0,200)

 sorted.forEach(([word,data])=>{

  const card=document.createElement("div")
  card.className="card"

  const dreamList=data.dreams.map(d=>`<li>${d}</li>`).join('')

  card.innerHTML=`
  <h4>${word}</h4>
  <small>出现 ${data.count} 次</small>
  <ul>${dreamList}</ul>
  `

  container.appendChild(card)
 })
}

function renderNetwork(){
 const container=document.getElementById("network")
 container.innerHTML=""

 const sorted=Object.entries(relations)
  .sort((a,b)=>b[1]-a[1])
  .slice(0,50)

 sorted.forEach(([pair,count])=>{

  const [a,b]=pair.split("|")

  const div=document.createElement("div")

  div.textContent=`${a}  ↔  ${b}   (${count})`

  container.appendChild(div)

 })
}

function searchDreams(){
 const q=document.getElementById("searchBox").value.trim()
 const container=document.getElementById("searchResults")
 container.innerHTML=""

 if(!q) return

 const results=dreams.filter(d=>d.text.includes(q))

 results.forEach(r=>{
  const div=document.createElement("div")
  div.className="card"

  const snippet=r.text.slice(0,160)

  div.innerHTML=`<b>${r.date}</b><p>${snippet}...</p>`

  container.appendChild(div)
 })
}

function exportDatabase(){
 const data={dreams,symbols,relations}
 const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"})
 const url=URL.createObjectURL(blob)
 const a=document.createElement("a")
 a.href=url
 a.download="dream_archive_db.json"
 a.click()
}

function importDatabase(){
 const file=document.getElementById("dbFile").files[0]
 if(!file) return

 const reader=new FileReader()

 reader.onload=function(){
  const data=JSON.parse(reader.result)
  dreams=data.dreams||[]
  symbols=data.symbols||{}
  relations=data.relations||{}
  render()
 }

 reader.readAsText(file)
}

function importTextFile(){
 const file=document.getElementById("fileInput").files[0]
 if(!file) return

 const reader=new FileReader()

 reader.onload=function(){
  document.getElementById("dreamInput").value=reader.result
 }

 reader.readAsText(file)
}

</script>

</body>
</html>
